"name": "Build ASC Video Watcher"

"on":
  workflow_dispatch:
  push:
    paths:
      - "tools/asc_video_watcher_py/**"
      - ".github/workflows/build-asc-video-watcher.yml"

jobs:
  build-macos:
    name: macOS APP
    runs-on: macos-14
    defaults:
      run:
        working-directory: tools/asc_video_watcher_py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Build app
        run: |
          python -m PyInstaller \
            --noconfirm \
            --windowed \
            --name "ASCVideoWatcher" \
            --collect-all playwright \
            main.py
          ditto -c -k --sequesterRsrc --keepParent "dist/ASCVideoWatcher.app" "dist/ASCVideoWatcher-macOS.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: ASCVideoWatcher-macOS
          path: tools/asc_video_watcher_py/dist/ASCVideoWatcher-macOS.zip

  build-windows:
    name: Windows EXE
    runs-on: windows-2022
    defaults:
      run:
        working-directory: tools/asc_video_watcher_py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Build exe
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --windowed --name "ASCVideoWatcher" --collect-all playwright main.py
          Compress-Archive -Path "dist/ASCVideoWatcher/*" -DestinationPath "dist/ASCVideoWatcher-Windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: ASCVideoWatcher-Windows
          path: tools/asc_video_watcher_py/dist/ASCVideoWatcher-Windows.zip
